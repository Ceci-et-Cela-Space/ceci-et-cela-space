services:
  decidim:
    build: .
    # Remplacement de rails s par puma (plus stable) et on s'assure qu'il utilise le port 3000
    command: sh -c "sleep 10 && bundle exec rake db:migrate ; bundle exec puma -b tcp://0.0.0.0:3000"
    ports:
      - "3000:3000" # <-- CORRECTION ICI : on expose le 3000 sur le 3000
    volumes:
      - decidim-uploads:/app/public/uploads
      - decidim-storage:/app/storage
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgres://decidim:${DATABASE_PASSWORD}@pg:5432/decidim_production
      - DATABASE_HOST=pg
      - DATABASE_USERNAME=decidim
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=decidim_production
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - RAILS_SERVE_STATIC_FILES=true
      - RAILS_LOG_TO_STDOUT=true
      - DISABLE_FORCE_SSL=true
      - QUEUE_ADAPTER=async
      # Cette variable aide Rails à comprendre qu'il est derrière un proxy Dokploy
      - DECIDIM_FORCE_SSL=false 
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - decidim-network
    restart: unless-stopped


    
  pg:
    image: postgres:16
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=decidim
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=decidim_production
    networks:
      - decidim-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decidim -d decidim_production"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - decidim-network
    restart: unless-stopped

networks:
  decidim-network:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  decidim-uploads:
  decidim-storage:
